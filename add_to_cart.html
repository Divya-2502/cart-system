<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add To Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet" />
</head>
<body>
    <div class="addtocartDiv container">
        <div class="cart_header">
            <span class="cart_count">0</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cart-fill" viewBox="0 0 16 16">
                <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
            </svg>
            <button class="clear_cart_count">Clear Cart</button>
        </div>
        <div class="products_amount row">
            <div class="col-lg-7">
                <div id="add_tocart_products">

                </div>
            </div>
            <div id="sub_total_total" class="col-lg-5 ps-lg-4 mt-4 mt-lg-0">
                <div class="sub_ttl_inner">
                    <p>PRICE DETAILS</p>
                    <p><span>Sub Total : </span><span id="subTotal"></span></p>
                    <p><span>STax: </span><span>$80</span></p>
                    <p class="total_p"><span>Total : </span><span id="total"></span></p>
                </div>
            </div>
        </div>
        <div class="empty_cart d_none" >
            <img src="images/empty_cart.png" alt="Empty cart image"/>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
